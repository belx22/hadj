services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_USE_MOCK: ${VITE_USE_MOCK:-true}
        VITE_DEFAULT_LOCALE: ${VITE_DEFAULT_LOCALE:-fr}
    image: copilote-hadj-frontend:latest
    container_name: copilote-hadj-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-33847}:80"
    networks:
      - copilote-hadj-network

# Réseau dédié, prêt à accueillir les services `backend` et `postgres` (non
# encore développés) lorsqu'ils rejoindront ce fichier.
networks:
  copilote-hadj-network:
    driver: bridge
