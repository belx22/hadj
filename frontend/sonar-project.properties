# Configuration SonarQube pour le frontend Copilote Hadj.
# Lancer d'abord `npm run coverage` (génère coverage/lcov.info), puis
# `sonar-scanner` avec un serveur SonarQube et un token :
#   sonar-scanner -Dsonar.host.url=<url> -Dsonar.token=<token>

sonar.projectKey=copilote-hadj-frontend
sonar.projectName=Copilote Hadj — Frontend
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx
sonar.exclusions=src/i18n/**,src/main.jsx,**/*.test.js,**/*.test.jsx,src/test/**

# Couverture (rapport LCOV produit par Vitest / v8).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Fichiers non pertinents pour la couverture unitaire (API navigateur / rendu
# graphique / câblage), alignés sur l'exclusion de couverture Vitest.
sonar.coverage.exclusions=src/utils/pdf.js,src/utils/excel.js,src/components/ui/QrScannerModal.jsx,src/pages/dashboard/DashboardPage.jsx,src/router/AppRouter.jsx,src/components/layout/MainLayout.jsx,src/main.jsx,src/i18n/**

sonar.sourceEncoding=UTF-8
