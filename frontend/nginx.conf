server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression pour les assets statiques
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Application React (SPA) : toute route inconnue retombe sur index.html.
    # index.html ne doit JAMAIS être mis en cache par le navigateur : il référence
    # les assets hashés (immutables). S'il est servi depuis le cache après un
    # redéploiement, l'utilisateur reste bloqué sur l'ancienne version (login KO,
    # écrans figés). On force donc une revalidation systématique de la coquille HTML.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # Proxy vers le backend Spring Boot (service "backend" du docker-compose) :
    # c'est l'unique source de données de l'application.
    #
    # On passe par une variable ($backend_host) + le resolver DNS interne de
    # Docker (127.0.0.11) pour que Nginx résolve le nom "backend" au moment de
    # la requête et NON au démarrage : sans cela, Nginx refuserait de démarrer
    # tant que le conteneur backend n'est pas joignable.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_host backend;
        # Pas de suffixe d'URI ici : avec une variable dans proxy_pass, Nginx
        # transmet l'URI d'origine telle quelle (/api/v1/... est conservé et
        # atteint le context-path /api/v1 du backend).
        proxy_pass http://$backend_host:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
